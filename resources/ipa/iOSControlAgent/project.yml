name: iOSControlAgent
options:
  bundleIdPrefix: com.ioscontrol
  deploymentTarget:
    iOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "12.0"
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE

targets:
  # 宿主 App — 纯 UI 壳，不导入 XCTest
  # bundleId 以 .xctrunner 结尾，go-ios/tidevice 识别为 XCUITest Runner
  iOSControlAgent:
    type: application
    platform: iOS
    sources:
      - path: iOSControlAgent
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ioscontrol.agent.xctrunner
        INFOPLIST_FILE: iOSControlAgent/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: iOSControlAgent/iOSControlAgent.entitlements
      properties:
        com.apple.security.network.server: true
        com.apple.security.network.client: true
    dependencies:
      - target: iOSControlAgentUITests

  # UI Test bundle — 包含所有自动化代码，嵌入 App 的 PlugIns 目录
  # 通过 go-ios runwda 启动，在 XCTest 运行时中获得触控/键盘模拟权限
  iOSControlAgentUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: iOSControlAgentUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ioscontrol.agent.uitests
        INFOPLIST_FILE: iOSControlAgentUITests/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        OTHER_LDFLAGS:
          - "-lsqlite3"
          - "-framework"
          - "JavaScriptCore"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

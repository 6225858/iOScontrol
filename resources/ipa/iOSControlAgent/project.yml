name: iOSControlAgent
options:
  bundleIdPrefix: com.ioscontrol
  deploymentTarget:
    iOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "13.0"
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE

targets:
  # 普通 App — iOS 15+ App 模式运行
  # 不依赖 XCTest，通过 ios launch 启动，HTTPServer 在 AppDelegate 中无条件启动
  # bundleId 以 .xctrunner 结尾，兼容现有工具链
  iOSControlAgent:
    type: application
    platform: iOS
    sources:
      - path: iOSControlAgent
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ioscontrol.agent.xctrunner
        INFOPLIST_FILE: iOSControlAgent/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        OTHER_LDFLAGS:
          - "-lsqlite3"
          - "-framework"
          - "JavaScriptCore"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: iOSControlAgent/iOSControlAgent.entitlements
      properties:
        com.apple.security.network.server: true
        com.apple.security.network.client: true

name: Build iOSControlAgent IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd resources/ipa/iOSControlAgent
          rm -rf iOSControlAgent.xcodeproj
          xcodegen generate
          echo "✅ Xcode project generated"

      - name: Fix project format for Xcode 15
        run: |
          cd resources/ipa/iOSControlAgent
          PBXPROJ="iOSControlAgent.xcodeproj/project.pbxproj"
          sed -i '' 's/objectVersion = 77/objectVersion = 56/' "$PBXPROJ"
          sed -i '' 's/compatibilityVersion = "Xcode 16.0"/compatibilityVersion = "Xcode 14.0"/' "$PBXPROJ"
          echo "✅ Project format downgraded for Xcode 15"

      - name: Build App
        run: |
          cd resources/ipa/iOSControlAgent
          xcodebuild \
            -project iOSControlAgent.xcodeproj \
            -scheme iOSControlAgent \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee build.log

      - name: Check build result
        run: |
          cd resources/ipa/iOSControlAgent
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed — showing errors"
            grep -E "error:" build.log || tail -80 build.log
            exit 1
          fi

      - name: Package IPA (unsigned)
        run: |
          cd resources/ipa/iOSControlAgent
          APP_PATH=$(find build/Build/Products -name "iOSControlAgent.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ iOSControlAgent.app not found"
            find build -name "*.app" -type d
            exit 1
          fi
          echo "Found app: $APP_PATH"

          # 列出 app 内部结构
          echo "=== App contents ==="
          ls -la "$APP_PATH/"
          echo "=== Frameworks ==="
          ls -la "$APP_PATH/Frameworks/" 2>/dev/null || echo "No Frameworks directory"

          # 移除签名（避免安装问题）
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -type f -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -type f -delete 2>/dev/null || true

          # 创建 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r iOSControlAgent.ipa Payload/
          rm -rf Payload
          echo "✅ IPA created: iOSControlAgent.ipa"
          ls -lh iOSControlAgent.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOSControlAgent-unsigned
          path: resources/ipa/iOSControlAgent/iOSControlAgent.ipa
          retention-days: 30

name: Build iOSControlAgent IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd resources/ipa/iOSControlAgent
          rm -rf iOSControlAgent.xcodeproj
          xcodegen generate
          echo "✅ Xcode project generated"

      - name: Fix project format for Xcode 15
        run: |
          cd resources/ipa/iOSControlAgent
          PBXPROJ="iOSControlAgent.xcodeproj/project.pbxproj"
          sed -i '' 's/objectVersion = 77/objectVersion = 56/' "$PBXPROJ"
          sed -i '' 's/compatibilityVersion = "Xcode 16.0"/compatibilityVersion = "Xcode 14.0"/' "$PBXPROJ"
          echo "✅ Project format downgraded for Xcode 15"

      - name: Build App Target
        run: |
          cd resources/ipa/iOSControlAgent
          xcodebuild \
            -project iOSControlAgent.xcodeproj \
            -scheme iOSControlAgent \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee build-app.log

      - name: Build Test Bundle
        run: |
          cd resources/ipa/iOSControlAgent
          xcodebuild \
            -project iOSControlAgent.xcodeproj \
            -scheme iOSControlAgentTests \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee build-tests.log

      - name: Check build result
        run: |
          cd resources/ipa/iOSControlAgent
          if grep -q "BUILD SUCCEEDED" build-tests.log; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
            tail -80 build-tests.log
            exit 1
          fi

      - name: Package IPA (unsigned)
        run: |
          cd resources/ipa/iOSControlAgent
          APP_PATH=$(find build -name "iOSControlAgent.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ iOSControlAgent.app not found"
            find build -name "*.app" -type d
            exit 1
          fi

          # 将 .xctest bundle 嵌入 App 的 Plugins 目录
          TEST_PATH=$(find build -name "iOSControlAgentTests.xctest" -type d | head -1)
          if [ -n "$TEST_PATH" ]; then
            mkdir -p "$APP_PATH/PlugIns"
            cp -r "$TEST_PATH" "$APP_PATH/PlugIns/"
            echo "✅ Test bundle embedded in PlugIns/"
          fi

          echo "Found app: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r iOSControlAgent.ipa Payload/
          rm -rf Payload
          echo "✅ IPA created: iOSControlAgent.ipa"
          ls -lh iOSControlAgent.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOSControlAgent-unsigned
          path: resources/ipa/iOSControlAgent/iOSControlAgent.ipa
          retention-days: 30
